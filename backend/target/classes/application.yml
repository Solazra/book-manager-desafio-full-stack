spring:
  application:
    name: book-manager
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bookmanager}
    username: ${DB_USER:bookmanager}
    password: ${DB_PASS:bookmanager}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:dev-only-secret-min-32-bytes-please-change}
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health

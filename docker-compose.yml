services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bookmanager
      POSTGRES_USER: bookmanager
      POSTGRES_PASSWORD: bookmanager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookmanager"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: bookmanager
      DB_USER: bookmanager
      DB_PASS: bookmanager
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-min-32-bytes-please-change}
      ALLOWED_ORIGINS: http://localhost:4200
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
